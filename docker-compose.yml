services:
  postgres:
    image: postgres:16-alpine
    container_name: gatetrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gatetrack
      POSTGRES_PASSWORD: gatetrack
      POSTGRES_DB: gatetrack
    ports:
      - "5432:5432"
    volumes:
      - gatetrack-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatetrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gatetrack-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://gatetrack:gatetrack@postgres:5432/gatetrack?schema=public"
      SESSION_SECRET: "${SESSION_SECRET?SESSION_SECRET is required}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gatetrack-postgres:
